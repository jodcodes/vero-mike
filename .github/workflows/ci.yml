name: Nightly CI

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: backend
      - run: npm ci
        working-directory: frontend
      - run: test -f README.md
      - run: test -f LICENSE
      - run: grep -Eiq 'quick[ -]?start|quickstart' README.md
